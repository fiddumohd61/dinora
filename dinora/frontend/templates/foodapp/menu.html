{% extends 'foodapp/base.html' %}

{% block content %}
<section style="padding:50px;">
    {% load static %}

    <section class="menu-page">
        <h1>Our Food Menu</h1>

        <div class="food-grid">

            {% for food in foods %}

            <div class="food-card">

                <img src="{{ food.image.url }}">

                <h3>{{ food.name }}</h3>

                <p>₹{{ food.price }}</p>

            </div>

            {% endfor %}

        </div>
    </section>
</section>
{% endblock %}
