{% extends 'foodapp/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'foodapp/css/write_review.css' %}">
{% endblock %}

{% block content %}

<div class="review-container">

    <h1>Write a Review</h1>

    <p>
        Share your experience with this order.
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Rating</label>
            {{ form.rating }}
        </div>

        <div class="form-group">
            <label>Your Review</label>
            {{ form.review }}
        </div>

        <button type="submit" class="submit-btn">
            Submit Review
        </button>

    </form>

</div>

{% endblock %}
