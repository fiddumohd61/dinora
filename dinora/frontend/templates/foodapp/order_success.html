{% extends 'foodapp/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'foodapp/css/order_success.css' %}">
{% endblock %}

{% block content %}

<div class="success-container">

    <div class="success-card">

        <div class="success-icon">
            ✓
        </div>

        <h1>Order Placed Successfully!</h1>

        <p>
            Thank you for ordering with Dinora.
            Your food is being prepared.
        </p>

        <h3>Order ID : #DIN123456</h3>

        <a href="{% url 'order_history' %}" class="track-btn">
            View Order History
        </a>
    </div>

</div>

{% endblock %}
