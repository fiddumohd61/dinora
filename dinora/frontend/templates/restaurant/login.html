{% extends 'foodapp/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'restaurant/css/login.css' %}">
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5 col-lg-4">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-4">

                    <h2 class="text-center mb-2 fw-bold">
                        Restaurant Login
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Sign in to manage your restaurant.
                    </p>

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Username

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
